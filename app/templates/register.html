<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NavPulse - 注册</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter','Noto Sans SC',ui-sans-serif,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(1000px 480px at -10% -5%, rgba(37,99,235,.12), transparent 62%),
    radial-gradient(1000px 420px at 110% 0%, rgba(37,99,235,.08), transparent 58%),
    #EEF3FB;
  -webkit-font-smoothing:antialiased;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:linear-gradient(135deg,#0F1F52 0%,#1D4ED8 55%,#4F8DF6 100%);
  opacity:.06;
}
.auth-wrap{
  width:100%;max-width:720px;padding:30px 20px;
  position:relative;z-index:1;animation:fadeUp .32s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:66px;height:66px;border-radius:18px;
  background:linear-gradient(135deg,#0F1F52 0%,#2563EB 100%);
  box-shadow:0 14px 34px rgba(37,99,235,.30);margin-bottom:14px;
  border:1px solid rgba(255,255,255,.35);
}
.auth-logo-icon i{font-size:30px;color:#fff}
.auth-logo h1{font-size:34px;font-weight:800;color:#0F172A;letter-spacing:.6px;line-height:1.05}
.auth-logo p{font-size:15px;color:#64748B;margin-top:8px;letter-spacing:.2px;font-weight:500}
.auth-card{
  background:rgba(255,255,255,.90);backdrop-filter:blur(10px);
  border-radius:24px;padding:40px 38px;
  box-shadow:0 1px 3px rgba(15,23,42,.06),0 18px 48px rgba(15,23,42,.10);
  border:1px solid rgba(226,232,240,.95);
}
.auth-card label{font-size:15px;font-weight:700;color:#334155;margin-bottom:8px;display:block}
.form-control{
  border:1.5px solid #D8E1ED;border-radius:14px;padding:15px 16px;
  font-size:19px;transition:border-color .2s,box-shadow .2s,background .2s;
  min-height:58px;
}
.form-control:focus{
  border-color:#2563EB;box-shadow:0 0 0 4px rgba(37,99,235,.18);outline:none;
  background:#fff;
}
.btn-auth{
  background:linear-gradient(135deg,#1D4ED8,#2563EB);border:none;
  border-radius:14px;padding:15px;font-size:22px;font-weight:800;
  letter-spacing:.3px;color:#fff;width:100%;cursor:pointer;
  box-shadow:0 14px 32px rgba(37,99,235,.34);transition:opacity .2s,transform .12s,box-shadow .2s;
}
.btn-auth:hover{opacity:.94;box-shadow:0 18px 36px rgba(37,99,235,.38)}.btn-auth:active{transform:scale(.98)}
.btn-auth:disabled{opacity:.6;cursor:not-allowed}
.auth-footer{text-align:center;margin-top:20px;font-size:18px;color:#64748B;font-weight:600}
.auth-footer a{color:#2563EB;font-weight:700;text-decoration:none}
.auth-footer a:hover{text-decoration:underline}
.alert{font-size:15px;border-radius:12px;padding:12px 14px;border:none}
.alert-danger{background:rgba(239,68,68,.08);color:#DC2626}
.alert-success{background:rgba(16,185,129,.08);color:#059669}

@media (max-width: 768px){
  .auth-wrap{max-width:520px;padding:24px 16px}
  .auth-logo{margin-bottom:28px}
  .auth-logo-icon{width:58px;height:58px;border-radius:16px;margin-bottom:12px}
  .auth-logo-icon i{font-size:28px}
  .auth-logo h1{font-size:22px}
  .auth-logo p{font-size:13px;margin-top:4px}
  .auth-card{padding:32px 28px;border-radius:20px}
  .auth-card label{font-size:13px;margin-bottom:6px}
  .form-control{font-size:15px;min-height:auto;padding:11px 14px;border-radius:10px}
  .btn-auth{font-size:16px;padding:12px;border-radius:12px}
  .auth-footer{margin-top:16px;font-size:14px;font-weight:500}
}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="auth-logo-icon"><i class="bi bi-graph-up-arrow"></i></div>
    <h1>NavPulse</h1>
    <p>基金估值 &middot; 创建账户</p>
  </div>
  <div class="auth-card">
    <div class="alert alert-danger d-none" id="errMsg"></div>
    <div class="alert alert-success d-none" id="okMsg"></div>
    <form id="regForm" onsubmit="return doRegister(event)">
      <div class="mb-3">
        <label for="username">用户名</label>
        <input class="form-control" id="username" placeholder="3-32个字符" required autofocus>
      </div>
      <div class="mb-3">
        <label for="password">密码</label>
        <input class="form-control" id="password" type="password" placeholder="8+字符，包含大小写+数字" required>
        <small class="text-muted" style="font-size:13px;display:block;margin-top:6px">
          至少 8 位，必顺包含大写字母、小写字母、数字
        </small>
      </div>
      <div class="mb-4">
        <label for="password2">确认密码</label>
        <input class="form-control" id="password2" type="password" placeholder="再次输入密码" required>
      </div>
      <button class="btn-auth" type="submit" id="btnReg">创建账户</button>
    </form>
  </div>
  <div class="auth-footer">
    已有账号？<a href="/login">去登录</a>
  </div>
</div>
<script>
async function doRegister(e){
  e.preventDefault();
  const btn=document.getElementById('btnReg');
  const errEl=document.getElementById('errMsg');
  const okEl=document.getElementById('okMsg');
  errEl.classList.add('d-none');okEl.classList.add('d-none');
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value.trim();
  const password2=document.getElementById('password2').value.trim();
  if(!username||username.length<3){errEl.textContent='用户名至少 3 个字符';errEl.classList.remove('d-none');return false}
  if(username.length>32){errEl.textContent='用户名最多 32 个字符';errEl.classList.remove('d-none');return false}
  // 密码强度校验（与后端一致）
  if(password.length<8){errEl.textContent='密码至少 8 个字符';errEl.classList.remove('d-none');return false}
  if(!/[a-z]/.test(password)){errEl.textContent='密码必须包含小写字母';errEl.classList.remove('d-none');return false}
  if(!/[A-Z]/.test(password)){errEl.textContent='密码必须包含大写字母';errEl.classList.remove('d-none');return false}
  if(!/[0-9]/.test(password)){errEl.textContent='密码必须包含数字';errEl.classList.remove('d-none');return false}
  if(password!==password2){errEl.textContent='两次密码不一致';errEl.classList.remove('d-none');return false}
  btn.disabled=true;btn.textContent='注册中…';
  try{
    const r=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.detail||'注册失败');
    okEl.textContent='注册成功！正在跳转到登录页…';okEl.classList.remove('d-none');
    setTimeout(()=>location.href='/login',1500);
  }catch(err){
    errEl.textContent=err.message;errEl.classList.remove('d-none');
  }finally{
    btn.disabled=false;btn.textContent='创建账户';
  }
  return false;
}
</script>
</body>
</html>
