<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NavPulse - 登录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter','Noto Sans SC',ui-sans-serif,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#F0F4FA;-webkit-font-smoothing:antialiased;
  position:relative;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:linear-gradient(135deg,#102057 0%,#2563EB 100%);
  opacity:.07;
}
.auth-wrap{
  width:100%;max-width:420px;padding:24px 16px;
  position:relative;z-index:1;animation:fadeUp .32s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:58px;height:58px;border-radius:16px;
  background:linear-gradient(135deg,#102057 0%,#2563EB 100%);
  box-shadow:0 8px 28px rgba(37,99,235,.32);margin-bottom:12px;
}
.auth-logo-icon i{font-size:28px;color:#fff}
.auth-logo h1{font-size:22px;font-weight:800;color:#0F172A;letter-spacing:.4px}
.auth-logo p{font-size:12.5px;color:#94A3B8;margin-top:3px;letter-spacing:.3px}
.auth-card{
  background:#fff;border-radius:20px;padding:32px 28px;
  box-shadow:0 1px 3px rgba(15,23,42,.06),0 12px 36px rgba(15,23,42,.08);
  border:1px solid #E2E8F0;
}
.auth-card label{font-size:13px;font-weight:600;color:#475569;margin-bottom:6px;display:block}
.form-control{
  border:1.5px solid #E2E8F0;border-radius:10px;padding:11px 14px;
  font-size:14px;transition:border-color .2s,box-shadow .2s;
}
.form-control:focus{
  border-color:#2563EB;box-shadow:0 0 0 3px rgba(37,99,235,.12);outline:none;
}
.btn-auth{
  background:linear-gradient(135deg,#1D4ED8,#2563EB);border:none;
  border-radius:12px;padding:12px;font-size:15px;font-weight:700;
  letter-spacing:.3px;color:#fff;width:100%;cursor:pointer;
  box-shadow:0 4px 14px rgba(37,99,235,.3);transition:opacity .2s,transform .12s;
}
.btn-auth:hover{opacity:.92}.btn-auth:active{transform:scale(.98)}
.btn-auth:disabled{opacity:.6;cursor:not-allowed}
.auth-footer{text-align:center;margin-top:16px;font-size:13.5px;color:#94A3B8}
.auth-footer a{color:#2563EB;font-weight:500;text-decoration:none}
.auth-footer a:hover{text-decoration:underline}
.alert{font-size:13px;border-radius:10px;padding:10px 14px;border:none}
.alert-danger{background:rgba(239,68,68,.08);color:#DC2626}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="auth-logo-icon"><i class="bi bi-graph-up-arrow"></i></div>
    <h1>NavPulse</h1>
    <p>基金实时估值 &middot; 登录账户</p>
  </div>
  <div class="auth-card">
    <div class="alert alert-danger d-none" id="errMsg"></div>
    <form id="loginForm" onsubmit="return doLogin(event)">
      <div class="mb-3">
        <label for="username">用户名</label>
        <input class="form-control" id="username" placeholder="请输入用户名" required autofocus>
      </div>
      <div class="mb-4">
        <label for="password">密码</label>
        <input class="form-control" id="password" type="password" placeholder="请输入密码" required>
      </div>
      <button class="btn-auth" type="submit" id="btnLogin">登&nbsp;&nbsp;录</button>
    </form>
  </div>
  <div class="auth-footer">
    还没有账号？<a href="/register">立即注册</a>
  </div>
</div>
<script>
if(localStorage.getItem('token')) location.href='/';
async function doLogin(e){
  e.preventDefault();
  const btn=document.getElementById('btnLogin');
  const errEl=document.getElementById('errMsg');
  errEl.classList.add('d-none');
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value.trim();
  if(!username||!password){errEl.textContent='请填写用户名和密码';errEl.classList.remove('d-none');return false}
  btn.disabled=true;btn.textContent='登录中…';
  try{
    const r=await fetch('/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.detail||'登录失败');
    localStorage.setItem('token',d.access_token);
    localStorage.setItem('username',d.username);
    location.href='/';
  }catch(err){
    errEl.textContent=err.message;errEl.classList.remove('d-none');
  }finally{
    btn.disabled=false;btn.textContent='登&nbsp;&nbsp;录';
  }
  return false;
}
</script>
</body>
</html>
