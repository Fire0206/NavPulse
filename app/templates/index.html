<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>NavPulse · 基金实时估值</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "vue": "https://cdn.jsdelivr.net/npm/vue@3/dist/vue.esm-browser.js"
    }
  }
  </script>
</head>
<body>
{% raw %}
<div id="app">
  <loading-overlay></loading-overlay>
  <top-bar></top-bar>
  <status-bar></status-bar>

  <holdings-view  v-show="store.currentView === 'holdings'"></holdings-view>
  <watchlist-view v-show="store.currentView === 'watchlist'"></watchlist-view>
  <market-view    v-show="store.currentView === 'market'"></market-view>
  <settings-view  v-show="store.currentView === 'settings'"></settings-view>

  <footer class="site-footer">
    <div>&copy; 2026 NavPulse. All rights reserved.</div>
  </footer>

  <bottom-nav></bottom-nav>

  <add-fund-modal   ref="addModalRef"></add-fund-modal>
  <fund-detail-modal ref="detailModalRef"></fund-detail-modal>
  <ocr-import-modal  ref="ocrModalRef"></ocr-import-modal>

  <!-- Toast -->
  <div class="top-toast">
    <div id="liveToast" class="toast align-items-center text-bg-dark border-0" role="alert" data-bs-delay="2200">
      <div class="d-flex">
        <div class="toast-body">{{ store.toastMsg }}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>
</div>
{% endraw %}

{% if icp_record %}
<div class="site-footer" style="text-align:center;padding:4px 0 0">
  <div class="icp"><a href="https://beian.miit.gov.cn/" target="_blank" rel="nofollow noopener">{{ icp_record }}</a></div>
</div>
{% endif %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script type="module" src="/static/js/app.js?v=20260305-8"></script>
</body>
</html>
